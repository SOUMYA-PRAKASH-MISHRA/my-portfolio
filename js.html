<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #9f9b9b;
    }
    .calculator {
      background: #c58a14;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      width: 300px;
    }
    .calculator input[type="number"] {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    .buttons {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
    }
    .buttons button {
      flex: 1;
      margin: 0 4px;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #007BFF;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    .buttons button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 10px;
      font-size: 18px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <label>First Value:</label>
    <input type="number" id="first" placeholder="Enter first number">

    <label>Second Value:</label>
    <input type="number" id="second" placeholder="Enter second number">

    <div class="buttons">
      <button onclick="calculate('add')">Add</button>
      <button onclick="calculate('sub')">Sub</button>
      <button onclick="calculate('mul')">Mul</button>
      <button onclick="calculate('div')">Div</button>
    </div>

    <label>Result:</label>
    <div class="result" id="result">---</div>
  </div>

  <script>
    function calculate(operation) {
      let num1 = parseFloat(document.getElementById("first").value);
      let num2 = parseFloat(document.getElementById("second").value);
      let result;

      if (isNaN(num1) || isNaN(num2)) {
        result = "Please enter both numbers!";
      } else {
        switch(operation) {
          case 'add': result = num1 + num2; break;
          case 'sub': result = num1 - num2; break;
          case 'mul': result = num1 * num2; break;
          case 'div': 
            result = num2 !== 0 ? (num1 / num2) : "Cannot divide by 0";
            break;
        }
      }
      document.getElementById("result").innerText = result;
    }
  </script>
</body>
</html>
